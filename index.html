<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>行政書士試験 完全攻略</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="行政書士">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/high-contrast.css">
</head>
<body>
  <!-- スクリーンリーダー用ライブリージョン -->
  <div aria-live="polite" aria-atomic="true" id="live-polite" class="sr-only"></div>
  <div aria-live="assertive" aria-atomic="true" id="live-assertive" class="sr-only"></div>

  <!-- ヘッダー (コンパクト) -->
  <header class="app-header" role="banner">
    <h1 class="app-title">行政書士試験</h1>
    <div class="header-actions">
      <button id="btn-contrast" class="icon-btn" aria-pressed="false" aria-label="高コントラスト切替">◐</button>
      <button id="btn-fontsize" class="icon-btn" aria-label="文字サイズ切替">A</button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main id="main-content" class="main-content" role="main" tabindex="-1">
    <!-- ページコンテンツはJSで動的に挿入 -->
  </main>

  <!-- ボトムナビゲーション (スマホ向け) -->
  <nav class="bottom-nav" role="navigation" aria-label="メインメニュー">
    <a href="#home" class="nav-item" data-page="home" aria-current="page" aria-label="ホーム">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span class="nav-label">ホーム</span>
    </a>
    <a href="#quiz" class="nav-item" data-page="quiz" aria-label="択一式演習">
      <span class="nav-icon" aria-hidden="true">📝</span>
      <span class="nav-label">択一式</span>
    </a>
    <a href="#essay" class="nav-item" data-page="essay" aria-label="記述式演習">
      <span class="nav-icon" aria-hidden="true">✍️</span>
      <span class="nav-label">記述式</span>
    </a>
    <a href="#flashcard" class="nav-item" data-page="flashcard" aria-label="暗記カード">
      <span class="nav-icon" aria-hidden="true">🃏</span>
      <span class="nav-label">暗記</span>
    </a>
    <a href="#dashboard" class="nav-item" data-page="dashboard" aria-label="進捗ダッシュボード">
      <span class="nav-icon" aria-hidden="true">📊</span>
      <span class="nav-label">進捗</span>
    </a>
    <a href="#calculator" class="nav-item" data-page="calculator" aria-label="採点計算機">
      <span class="nav-icon" aria-hidden="true">🧮</span>
      <span class="nav-label">採点</span>
    </a>
  </nav>

  <!-- データエクスポートボタン (フッター代替) -->
  <div id="export-bar" class="export-bar" hidden>
    <button id="btn-export" class="btn btn-sm btn-outline">学習データをエクスポート</button>
  </div>

  <!-- オーバーレイ -->
  <div id="modal-overlay" class="modal-overlay" hidden aria-hidden="true"></div>

  <!-- スクリプト -->
  <script src="js/storage.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/data/questions-gyosei.js"></script>
  <script src="js/data/questions-kenpo.js"></script>
  <script src="js/data/questions-minpo.js"></script>
  <script src="js/data/questions-ippan.js"></script>
  <script src="js/data/questions-essay.js"></script>
  <script src="js/data/flashcards.js"></script>
  <script src="js/modules/quiz.js"></script>
  <script src="js/modules/essay.js"></script>
  <script src="js/modules/flashcard.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/calculator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
